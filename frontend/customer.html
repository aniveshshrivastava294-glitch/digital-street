<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Street - Marketplace</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div id="app" class="app-container">
        
        <!-- App Navigation Header -->
        <header class="app-header glass-panel" style="flex-direction: row; justify-content: space-between; align-items: center;">
            <div class="header-logo" onclick="openProfileModal()" style="cursor:pointer; display:flex; align-items:center; gap:0.5rem;">
                <div style="width: 32px; height: 32px; border-radius: 50%; background: var(--accent-blue); display: flex; align-items: center; justify-content: center; color: white;">
                    <i data-lucide="user" style="width:18px; height:18px"></i>
                </div>
                <div>
                    <h1 id="user-display-name" style="font-size: 1rem; margin:0;">Loading...</h1>
                    <small style="color:var(--text-secondary); font-size:0.7rem;">View Profile</small>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">
                <i data-lucide="log-out"></i> Logout
            </button>
        </header>

        <!-- Main Workspace -->
        <main id="main-content">
            
            <!-- SECTION: CUSTOMER VIEW -->
            <section id="customer-view" class="view-section active">
                
                <!-- NEW: Customer E-Wallet Card -->
                <div class="glass-panel" style="padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.15)); border: 1px solid rgba(59, 130, 246, 0.3);">
                    <div>
                        <div style="font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; margin-bottom: 0.25rem; display: flex; align-items: center; gap: 0.3rem;"><i data-lucide="wallet" style="width:14px; height:14px;"></i> Digital Wallet</div>
                        <div id="customer-wallet-balance" style="font-size: 2.5rem; font-weight: 800; color: var(--text-primary);">₹0.00</div>
                    </div>
                    <button class="primary-btn" style="background: var(--accent-blue);" onclick="openAddFundsModal()">
                        <i data-lucide="plus-circle" style="width: 16px; height: 16px;"></i> Top Up
                    </button>
                </div>

                <div class="view-header" style="margin-top: 1.5rem;">
                    <h2>Live Near You</h2>
                    <p>Snag fresh goods from local vendors around you.</p>
                </div>
                
                <div class="product-grid" id="customer-product-list">
                    <!-- Products rendered via JS -->
                </div>
            </section>

        </main>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel" style="background: var(--bg-color);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2>My Account Profile</h2>
                <button onclick="closeProfileModal()" style="background:none; border:none; color:white; cursor:pointer;"><i data-lucide="x"></i></button>
            </div>
            <div style="display: flex; flex-direction: column; gap: 1.25rem;">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="profile-name" class="modal-input" />
                </div>
                <div id="profile-vendor-fields" style="display: none;">
                    <div class="input-group" style="margin-bottom: 1.25rem;">
                        <label>Shop Name</label>
                        <input type="text" id="profile-shopname" class="modal-input" />
                    </div>
                    <div class="input-group">
                        <label>Contact Number</label>
                        <input type="text" id="profile-phone" class="modal-input" />
                    </div>
                </div>
                <button class="primary-btn huge-btn" style="background: var(--accent-blue); margin-top: 0.5rem;" onclick="updateProfile()">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- E-Wallet Add Funds Modal -->
    <div id="add-funds-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel" style="background: var(--bg-color);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2>Deposit Funds</h2>
                <button onclick="closeAddFundsModal()" style="background:none; border:none; color:white; cursor:pointer;"><i data-lucide="x"></i></button>
            </div>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <p style="color: var(--text-secondary); font-size: 0.9rem;">Instantly add mock currency to your Digital Wallet securely.</p>
                <div style="position: relative;">
                    <span style="position: absolute; left: 1rem; top: 1rem; color: white;">₹</span>
                    <input type="number" id="wallet-deposit-amount" placeholder="0.00" step="50" class="modal-input" style="padding-left: 2rem;" />
                </div>
                <button class="primary-btn huge-btn" style="background: var(--accent-blue);" onclick="confirmAddFunds()">Secure Deposit</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="./script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            window.APP_MODE = 'CUSTOMER';
            initApp();
        });
    </script>
</body>
</html>
