<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Dashboard - Digital Street</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div id="app" class="app-container">
        
        <!-- App Navigation Header -->
        <header class="app-header glass-panel" style="flex-direction: row; justify-content: space-between; align-items: center;">
            <div class="header-logo" onclick="openProfileModal()" style="cursor:pointer; display:flex; align-items:center; gap:0.5rem;">
                <div style="width: 32px; height: 32px; border-radius: 50%; background: var(--accent-orange); display: flex; align-items: center; justify-content: center; color: white;">
                    <i data-lucide="store" style="width:18px; height:18px"></i>
                </div>
                <div>
                    <h1 id="user-display-name" style="font-size: 1rem; margin:0;">Loading...</h1>
                    <small style="color:var(--text-secondary); font-size:0.7rem;">Manage Profile</small>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">
                <i data-lucide="log-out"></i> Logout
            </button>
        </header>

        <!-- Main Workspace -->
        <main id="main-content">
            
            <!-- SECTION: VENDOR DASHBOARD -->
            <section id="vendor-view" class="view-section active">
                
                <!-- NEW: Vendor Sales Analytics -->
                <div class="glass-panel" style="padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(16, 185, 129, 0.05)); border: 1px solid rgba(16, 185, 129, 0.3); margin-bottom: 2rem;">
                    <div>
                        <div style="font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; margin-bottom: 0.25rem; display: flex; align-items: center; gap: 0.3rem;"><i data-lucide="trending-up" style="width:14px; height:14px; color: var(--accent-green);"></i> Personal Generated Revenue</div>
                        <div id="vendor-daily-sales" style="font-size: 2.5rem; font-weight: 800; color: var(--text-primary);">₹0.00</div>
                    </div>
                </div>

                <div class="vendor-top-bar" style="margin-bottom: 1.5rem; display:flex; justify-content: space-between; align-items:center;">
                    <div>
                        <h2>Store Management</h2>
                    </div>
                    <button class="primary-btn huge-btn" id="btn-add-stock" style="min-width: unset; padding: 0.5rem 1rem; background: var(--accent-blue);" onclick="addNewItem()"><i data-lucide="plus"></i> Add Product</button>
                </div>
                
                <div class="vendor-products-list" id="vendor-product-list">
                    <!-- Products rendered via JS -->
                </div>
            </section>

        </main>
        
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel" style="background: var(--bg-color);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2>Shop Profile</h2>
                <button onclick="closeProfileModal()" style="background:none; border:none; color:white; cursor:pointer;"><i data-lucide="x"></i></button>
            </div>
            <div style="display: flex; flex-direction: column; gap: 1.25rem;">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="profile-name" class="modal-input" />
                </div>
                <div id="profile-vendor-fields">
                    <div class="input-group" style="margin-bottom: 1.25rem;">
                        <label>Shop Name</label>
                        <input type="text" id="profile-shopname" class="modal-input" />
                    </div>
                    <div class="input-group">
                        <label>Contact Number (for customers)</label>
                        <input type="text" id="profile-phone" class="modal-input" />
                    </div>
                </div>
                <button class="primary-btn huge-btn" style="background: var(--accent-orange); margin-top: 0.5rem;" onclick="updateProfile()">Save Statistics</button>
            </div>
        </div>
    </div>

    <!-- Add Item Modal -->
    <div id="add-item-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel" style="background: var(--bg-color);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2>Add Product to Street</h2>
                <button onclick="closeAddModal()" style="background:none; border:none; color:white; cursor:pointer;"><i data-lucide="x"></i></button>
            </div>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <input type="text" id="new-item-name" placeholder="Item Name (e.g. Fresh Cookies)" class="modal-input" />
                <input type="number" id="new-item-price" placeholder="Price (e.g. 5.50)" step="0.01" class="modal-input" />
                <button class="primary-btn huge-btn" style="background: var(--accent-green); color:black;" onclick="saveNewItem()">List Product</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="./firebase-config.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="./script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            window.APP_MODE = 'VENDOR';
            initApp();
        });
    </script>
</body>
</html>
