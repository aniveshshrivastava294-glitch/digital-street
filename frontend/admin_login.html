<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Portal - Admin Login</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
    <style>
        .login-container {
            background: white;
            padding: 3rem;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(45, 36, 30, 0.1);
            width: 100%;
        }
        .logo-icon-large {
            color: var(--accent-orange);
            width: 64px;
            height: 64px;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        .input-group label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .auth-input {
            width: 100%;
            padding: 1rem 1.25rem;
            border-radius: 16px;
            border: 1px solid var(--panel-border);
            background: #fdfaf7;
            color: var(--text-primary);
            outline: none;
            transition: 0.3s;
            font-size: 1rem;
        }
        .auth-input:focus {
            border-color: var(--accent-orange);
            box-shadow: 0 0 0 4px rgba(192, 140, 93, 0.1);
        }
    </style>
</head>
<body class="login-body">
    <div class="login-container glass-panel" style="max-width: 420px; border-top: none;">
        <div class="login-header" style="text-align: center; margin-bottom: 2rem;">
            <i data-lucide="shield-check" class="logo-icon-large"></i>
            <h1>Admin Access</h1>
            <p style="color: var(--text-secondary); font-size: 0.95rem;">Enter your secure credentials to access the Digital Street Command Center.</p>
        </div>
        
        <form onsubmit="handleAdminLogin(event)" style="display: flex; flex-direction: column; gap: 1.5rem;">
            <div class="input-group">
                <label>Administrator ID (Email)</label>
                <input type="email" id="admin-email" class="auth-input" placeholder="admin@admin.com" required autofocus>
            </div>
            <div class="input-group">
                <label>Access Password</label>
                <input type="password" id="admin-password" class="auth-input" placeholder="••••••••" required>
            </div>
            
            <button type="submit" id="admin-login-btn" class="primary-btn huge-btn" style="background: var(--accent-orange); color: white; margin-top: 1rem;">
                <i data-lucide="lock-open"></i> Authenticate & Enter
            </button>
            <a href="index.html" style="text-align: center; color: var(--text-secondary); text-decoration: none; font-size: 0.85rem;">← Back to Home Page</a>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => lucide.createIcons());

        function handleAdminLogin(e) {
            e.preventDefault();
            const email = document.getElementById('admin-email').value.trim();
            const pwd = document.getElementById('admin-password').value;

            if (email === 'admin@admin.com' && pwd === 'Anivesh@123') {
                const adminUser = { 
                    name: 'Platform Admin', 
                    email: 'admin@admin.com', 
                    role: 'ADMIN', 
                    walletBalance: 0, 
                    totalSpent: 0, 
                    totalGenerated: 0 
                };
                localStorage.setItem('digitalStreetSession', JSON.stringify(adminUser));
                localStorage.setItem('adminAuthenticated', 'true');
                window.location.href = "admin.html";
            } else {
                alert("❌ Incorrect Admin credentials.");
                document.getElementById('admin-password').value = '';
                document.getElementById('admin-password').focus();
            }
        }
    </script>
</body>
</html>
