<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Portal - Admin Login</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
    <style>
        .login-container {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            padding: 0; /* Remove padding for image bleed */
            border-radius: 40px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.2);
            width: 100%;
            overflow: hidden; /* For image corners */
        }
        
        .admin-hero-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid var(--panel-border);
        }

        .login-form-wrapper {
            padding: 3rem;
        }
        .logo-icon-large {
            color: var(--accent-orange);
            width: 64px;
            height: 64px;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        .input-group label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .auth-input {
            width: 100%;
            padding: 1rem 1.25rem;
            border-radius: 16px;
            border: 1px solid var(--panel-border);
            background: #fdfaf7;
            color: var(--text-primary);
            outline: none;
            transition: 0.3s;
            font-size: 1rem;
        }
        .auth-input:focus {
            border-color: var(--accent-orange);
            box-shadow: 0 0 0 4px rgba(192, 140, 93, 0.1);
        }
    </style>
</head>
<body class="login-body">
    <div class="login-container glass-panel" style="max-width: 440px;">
        <img src="./admin_security_hero_1775021948540.png" alt="Secure Administration" class="admin-hero-img">
        
        <div class="login-form-wrapper">
            <div class="login-header" style="text-align: center; margin-bottom: 2rem;">
                <i data-lucide="shield-check" class="logo-icon-large"></i>
                <h1>Admin Access</h1>
                <p style="color: var(--text-secondary); font-size: 0.95rem;">Enter your secure credentials to access the Digital Street Command Center.</p>
            </div>
            
            <form onsubmit="handleAdminLogin(event)" style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="input-group">
                    <label>Administrator ID (Email)</label>
                    <input type="email" id="admin-email" class="auth-input" placeholder="admin@admin.com" required autofocus>
                </div>
                <div class="input-group">
                    <label>Access Password</label>
                    <input type="password" id="admin-password" class="auth-input" placeholder="••••••••" required>
                </div>
                
                <button type="submit" id="admin-login-btn" class="primary-btn huge-btn" style="background: var(--accent-orange); color: white; margin-top: 1rem; width: 100%; justify-content: center;">
                    <i data-lucide="lock-open"></i> Authenticate & Enter
                </button>
                <div style="text-align: center; margin-top: 1rem;">
                    <a href="index.html" style="color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; opacity: 0.7; transition: 0.3s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7">← Back to Home Page</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => lucide.createIcons());

        function handleAdminLogin(e) {
            e.preventDefault();
            const email = document.getElementById('admin-email').value.trim();
            const pwd = document.getElementById('admin-password').value;

            if (email === 'admin@admin.com' && pwd === 'Anivesh@123') {
                const adminUser = { 
                    name: 'Platform Admin', 
                    email: 'admin@admin.com', 
                    role: 'ADMIN', 
                    walletBalance: 0, 
                    totalSpent: 0, 
                    totalGenerated: 0 
                };
                localStorage.setItem('digitalStreetSession', JSON.stringify(adminUser));
                localStorage.setItem('adminAuthenticated', 'true');
                window.location.href = "admin.html";
            } else {
                alert("❌ Incorrect Admin credentials.");
                document.getElementById('admin-password').value = '';
                document.getElementById('admin-password').focus();
            }
        }
    </script>
</body>
</html>
