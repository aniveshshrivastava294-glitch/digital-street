<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Street - Welcome</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .auth-tabs { display: flex; gap: 1rem; margin-bottom: 2rem; justify-content: center; }
        .auth-tab { cursor: pointer; padding: 0.75rem 1.5rem; border-radius: 50px; color: var(--text-secondary); font-weight: 700; transition: all 0.3s; background: rgba(0,0,0,0.03); }
        .auth-tab.active { color: white; background: var(--accent-orange); box-shadow: 0 4px 15px rgba(192, 140, 93, 0.3); }
        .auth-form { display: none; flex-direction: column; gap: 1.25rem; }
        .auth-form.active { display: flex; }
        .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .input-group label { font-size: 0.85rem; color: var(--text-secondary); font-weight: 600; }
        .auth-input { width: 100%; padding: 1rem 1.25rem; border-radius: 16px; border: 1px solid var(--panel-border); background: #fdfaf7; color: var(--text-primary); outline: none; transition: 0.3s; font-size: 1rem; }
        .auth-input:focus { border-color: var(--accent-orange); box-shadow: 0 0 0 4px rgba(192, 140, 93, 0.1); }
        .role-selector { display: flex; gap: 0.75rem; margin-bottom: 1rem; }
        .role-btn { flex: 1; padding: 0.75rem; border: 1px solid var(--panel-border); border-radius: 12px; background: #fdfaf7; color: var(--text-secondary); cursor: pointer; transition: 0.3s; text-align: center; font-size: 0.9rem; font-weight: 600; }
        .role-btn.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }
        .vendor-fields { display: none; flex-direction: column; gap: 1.25rem; }
        .vendor-fields.active { display: flex; }
        
        .login-container {
            background: white;
            padding: 3rem;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(45, 36, 30, 0.1);
        }
        .logo-icon-large {
            color: var(--accent-orange);
            width: 64px;
            height: 64px;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        .primary-btn.huge-btn {
            background: var(--accent-orange);
            color: white;
            padding: 1.25rem;
            font-size: 1.1rem;
            letter-spacing: 1px;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body class="login-body">
    <div class="login-container glass-panel" style="max-width: 450px;">
        <div class="login-header">
            <i data-lucide="store" class="logo-icon-large"></i>
            <h1>Digital Street</h1>
            <p style="margin-bottom: 1rem; color: var(--text-secondary); font-size: 0.9rem;">Connecting your neighborhood with fresh goods.</p>
        </div>
        
        <div class="auth-tabs">
            <div class="auth-tab active" onclick="switchAuth('login')">Login</div>
            <div class="auth-tab" onclick="switchAuth('signup')">Sign Up</div>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form active" onsubmit="handleAuth(event, 'login')">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="login-email" class="auth-input" placeholder="alex@example.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-password" class="auth-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="primary-btn huge-btn" style="margin-top: 0.5rem;">Enter the Street</button>
        </form>

        <!-- Signup Form -->
        <form id="signup-form" class="auth-form" onsubmit="handleAuth(event, 'signup')">
            <div class="role-selector">
                <div id="role-customer" class="role-btn active" onclick="switchRole('CUSTOMER')">Customer</div>
                <div id="role-vendor" class="role-btn" onclick="switchRole('VENDOR')">Vendor</div>
            </div>
            <input type="hidden" id="signup-role" value="CUSTOMER">
            
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="signup-name" class="auth-input" placeholder="Alex Smith" required>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="signup-email" class="auth-input" placeholder="alex@example.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="signup-password" class="auth-input" placeholder="Minimum 6 characters" required>
            </div>
            
            <!-- Vendor Specific Fields -->
            <div id="vendor-fields" class="vendor-fields">
                <div class="input-group">
                    <label>Shop Name</label>
                    <input type="text" id="signup-shopname" class="auth-input" placeholder="Golden Grain Bakery">
                </div>
                <div class="input-group">
                    <label>Contact Number (for customers)</label>
                    <input type="tel" id="signup-phone" class="auth-input" placeholder="+91 98XXX XXXXX">
                </div>
            </div>

            <button type="submit" class="primary-btn huge-btn" style="margin-top: 0.5rem; background: var(--accent-blue);">Create Account</button>
        </form>

        <div class="login-divider"></div>
        
        <div style="text-align: center; display: flex; flex-direction: column; gap: 0.5rem; align-items: center;">
            <p style="font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; font-weight: 700;">Platform Administration</p>
            <a href="admin_login.html" class="primary-btn" style="background: rgba(139, 92, 246, 0.1); border: 1px solid rgba(139, 92, 246, 0.3); color: var(--accent-purple); width: auto; font-size: 0.85rem; padding: 0.5rem 1.5rem; text-decoration: none;">
                <i data-lucide="shield" style="width: 14px; height: 14px;"></i> Enterprise Portal
            </a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            updateProfile,
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
            // Automatically redirect if session exists
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    const userDoc = await getDoc(doc(db, "users", user.email));
                    if (userDoc.exists()) {
                        const userData = userDoc.data();
                        localStorage.setItem('digitalStreetSession', JSON.stringify({ ...userData, email: user.email }));
                        if (userData.role === 'CUSTOMER') window.location.href = 'customer.html';
                        else if (userData.role === 'VENDOR') window.location.href = 'vendor.html';
                        else if (userData.role === 'ADMIN') window.location.href = 'admin.html';
                    } else if (user.email === 'admin@example.com' || user.email === 'admin') {
                        // Handle legacy admin or special case
                        window.location.href = 'admin.html';
                    }
                }
            });
        });

        window.switchAuth = (type) => {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            if (type === 'login') {
                document.querySelector('.auth-tab:nth-child(1)').classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelector('.auth-tab:nth-child(2)').classList.add('active');
                document.getElementById('signup-form').classList.add('active');
            }
        };

        window.switchRole = (role) => {
            document.getElementById('role-customer').classList.toggle('active', role === 'CUSTOMER');
            document.getElementById('role-vendor').classList.toggle('active', role === 'VENDOR');
            document.getElementById('signup-role').value = role;
            document.getElementById('vendor-fields').classList.toggle('active', role === 'VENDOR');
            document.getElementById('signup-shopname').required = (role === 'VENDOR');
            document.getElementById('signup-phone').required = (role === 'VENDOR');
        };

        window.handleAuth = async (event, type) => {
            event.preventDefault();
            const email = document.getElementById(`${type}-email`).value.trim();
            const password = document.getElementById(`${type}-password`).value.trim();
            
            try {
                if (type === 'login') {
                    // Admin override check
                    if (email === 'admin@admin.com' && password === 'Anivesh@123') {
                        const adminUser = { name: 'Platform Admin', email: 'admin@admin.com', role: 'ADMIN', walletBalance: 0, totalSpent: 0, totalGenerated: 0 };
                        localStorage.setItem('digitalStreetSession', JSON.stringify(adminUser));
                        window.location.href = "admin.html";
                        return;
                    }

                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;
                    const userDoc = await getDoc(doc(db, "users", email));
                    if(userDoc.exists()) {
                        const userData = userDoc.data();
                        localStorage.setItem('digitalStreetSession', JSON.stringify({ ...userData, email }));
                        if (userData.role === 'CUSTOMER') window.location.href = 'customer.html';
                        else window.location.href = 'vendor.html';
                    }
                } else {
                    const role = document.getElementById('signup-role').value;
                    const name = document.getElementById('signup-name').value.trim();
                    const shopName = document.getElementById('signup-shopname').value.trim();
                    const phoneNumber = document.getElementById('signup-phone').value.trim();

                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;
                    
                    // Create Firestore User Document
                    const newUser = { 
                        name, email, role, shopName, phoneNumber,
                        walletBalance: 0, totalSpent: 0, totalGenerated: 0 
                    };
                    await setDoc(doc(db, "users", email), newUser);
                    
                    localStorage.setItem('digitalStreetSession', JSON.stringify(newUser));
                    if (role === 'CUSTOMER') window.location.href = 'customer.html';
                    else window.location.href = 'vendor.html';
                }
            } catch (error) {
                console.error("Auth Error:", error);
                // Show friendly, human-readable error messages
                if (error.code === 'auth/email-already-in-use') {
                    alert("✅ You already have an account! Please use the Login tab to sign in.");
                    switchAuth('login');
                    document.getElementById('login-email').value = email;
                } else if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                    alert("❌ No account found with this email. Please Sign Up first.");
                    switchAuth('signup');
                } else if (error.code === 'auth/wrong-password') {
                    alert("❌ Incorrect password. Please try again.");
                } else if (error.code === 'auth/invalid-email') {
                    alert("❌ Please enter a valid email address.");
                } else if (error.code === 'auth/weak-password') {
                    alert("❌ Password must be at least 6 characters.");
                } else {
                    alert("Something went wrong: " + (error.message || "Please try again."));
                }
            }
        };
        
        window.promptAdminLogin = async (e) => {
            e.preventDefault();
            const pwd = prompt("Enter Administration Password:");
            if(pwd === 'Anivesh@123') {
                const adminUser = { name: 'Platform Admin', email: 'admin', role: 'ADMIN', walletBalance: 0, totalSpent: 0, totalGenerated: 0 };
                localStorage.setItem('digitalStreetSession', JSON.stringify(adminUser));
                window.location.href = "admin.html";
            } else {
                alert("Incorrect Password.");
            }
        };
    </script>
</body>
</html>
